    <main>
      <section>
        <h1>Contact Me</h1>
        <p>Silakan isi formulir di bawah ini untuk menghubungi saya.</p>

        <form action="#" method="POST">
          <fieldset>
            <legend>Formulir Pesan</legend>
            <p>
              <label for="name">Nama Lengkap:</label><br />
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Masukkan nama Anda"
                required
              />
            </p>
            <p>
              <label for="email">Email:</label><br />
              <input
                type="email"
                id="email"
                name="email"
                placeholder="contoh@mail.com"
                required
              />
            </p>
            <p>
              <label for="subject">Subjek:</label><br />
              <select id="subject" name="subject">
                <option value="kerjasama">Tawaran Kerjasama</option>
                <option value="pertanyaan">Pertanyaan Umum</option>
                <option value="lainnya">Lainnya</option>
              </select>
            </p>
            <p>
              <label for="message">Pesan:</label><br />
              <textarea
                id="message"
                name="message"
                rows="6"
                cols="30"
                placeholder="Tulis pesan Anda di sini..."
                required
              ></textarea>
            </p>
            <p>
              <button type="submit">Kirim Pesan</button>
              <button type="reset">Hapus Form</button>
            </p>
          </fieldset>
        </form>
      </section>
    </main>

    <hr />
